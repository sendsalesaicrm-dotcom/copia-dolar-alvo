<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dólar Alvo</title>
    <link rel="icon" type="image/svg+xml"
        href="https://blobgpedbfdjweiyxbzu.supabase.co/storage/v1/object/public/imagens/porquinho.svg" />
    <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-background light">
    <div id="root"></div>
    <script>
        // Hotfix: append AwesomeAPI token to requests to economia.awesomeapi.com.br
        (function(){
            const TOKEN = 'e4f3a92e9ca9fd759191e13bce9d89faf9f540ceb92ee073eff53df99272e630';
            if(typeof window === 'undefined') return;
            const origFetch = window.fetch.bind(window);
            window.fetch = function(input, init){
                try{
                    let url = typeof input === 'string' ? input : (input && input.url) || '';
                    if(url && url.includes('economia.awesomeapi.com.br')){
                        const hasQuery = url.indexOf('?') !== -1;
                        const sep = hasQuery ? '&' : '?';
                        // Avoid double-appending token
                        if(!url.includes('token=')){
                            url = url + sep + 'token=' + TOKEN;
                            if(typeof input === 'object' && input && input.url){
                                input = new Request(url, input);
                            } else {
                                input = url;
                            }
                        }
                    }
                }catch(e){}
                return origFetch(input, init);
            };
        })();
    </script>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
